<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>半夜偷玩手机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #menu-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0d0d1a 0%, #1a0a2e 50%, #0d0d1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        
        .menu-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            margin-bottom: 10px;
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        .menu-subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 50px;
            letter-spacing: 3px;
        }
        
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .difficulty-btn {
            width: 200px;
            padding: 14px 0;
            margin: 8px 0;
            border: 2px solid;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: inherit;
            position: relative;
            overflow: hidden;
        }
        
        .difficulty-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 20px currentColor;
        }
        
        .btn-easy { color: #00ff88; border-color: #00ff88; }
        .btn-normal { color: #00ccff; border-color: #00ccff; }
        .btn-hard { color: #ffaa00; border-color: #ffaa00; }
        .btn-nightmare { color: #ff4444; border-color: #ff4444; }
        .btn-hell { color: #ff00ff; border-color: #ff00ff; animation: hellPulse 1s infinite; }
        
        @keyframes hellPulse {
            0%, 100% { box-shadow: 0 0 10px #ff00ff; }
            50% { box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff; }
        }
        
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        #game-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            display: none;
            flex-direction: column;
            z-index: 50;
        }
        
        #game-canvas {
            flex: 1;
            display: block;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #050505 100%);
            width: 100%;
            height: 100%;
        }
        
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 10;
            font-size: 0.9rem;
        }
        
        .hud-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .hud-label { color: #888; }
        .hud-value { color: #00ff88; font-weight: bold; font-size: 1.1rem; }
        
        .progress-bar {
            width: 100px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-left: 5px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            transition: width 0.3s;
            border-radius: 4px;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px;
            gap: 8px;
            z-index: 10;
        }
        
        .ctrl-btn {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
        }
        
        .ctrl-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.95);
        }
        
        .ctrl-up { grid-column: 2; grid-row: 1; }
        .ctrl-left { grid-column: 1; grid-row: 2; }
        .ctrl-down { grid-column: 2; grid-row: 2; }
        .ctrl-right { grid-column: 3; grid-row: 2; }
        
        #mom-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: warningFlash 0.3s infinite alternate;
            pointer-events: none;
        }
        
        @keyframes warningFlash {
            from { background: rgba(255,0,0,0.7); }
            to { background: rgba(255,0,0,0.95); }
        }
        
        .warning-text {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px white;
            animation: warningShake 0.5s infinite;
            text-align: center;
