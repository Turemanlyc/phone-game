<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>半夜偷玩手机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        html, body { background: #0a0a0a; color: #e0e0e0; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; overflow: hidden; width: 100%; height: 100%; }
        #menu-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #0d0d1a 0%, #1a0a2e 50%, #0d0d1a 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s; }
        .menu-title { font-size: 2.5rem; font-weight: bold; color: #00ff88; text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; margin-bottom: 10px; animation: titlePulse 2s ease-in-out infinite; }
        .menu-subtitle { font-size: 0.9rem; color: #888; margin-bottom: 50px; letter-spacing: 3px; }
        @keyframes titlePulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        .difficulty-btn { width: 200px; padding: 14px 0; margin: 8px 0; border: 2px solid; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; background: transparent; color: inherit; position: relative; overflow: hidden; }
        .difficulty-btn:hover { transform: scale(1.08); box-shadow: 0 0 20px currentColor; }
        .btn-easy { color: #00ff88; border-color: #00ff88; }
        .btn-normal { color: #00ccff; border-color: #00ccff; }
        .btn-hard { color: #ffaa00; border-color: #ffaa00; }
        .btn-nightmare { color: #ff4444; border-color: #ff4444; }
        .btn-hell { color: #ff00ff; border-color: #ff00ff; animation: hellPulse 1s infinite; }
        @keyframes hellPulse { 0%, 100% { box-shadow: 0 0 10px #ff00ff; } 50% { box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff; } }
        .stars { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        #game-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: none; z-index: 50; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; background: radial-gradient(ellipse at center, #0a0a1a 0%, #050505 100%); }
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 10; font-size: 0.9rem; pointer-events: none; }
        .hud-item { display: flex; align-items: center; gap: 5px; }
        .hud-label { color: #888; }
        .hud-value { color: #00ff88; font-weight: bold; font-size: 1.1rem; }
        .progress-bar { width: 100px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-left: 5px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00ccff); transition: width 0.3s; border-radius: 4px; }
        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px; gap: 8px; z-index: 10; }
        .ctrl-btn { width: 60px; height: 60px; border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; background: rgba(255,255,255,0.1); color: white; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; cursor: pointer; user-select: none; transition: all 0.1s; }
        .ctrl-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }
        .ctrl-up { grid-column: 2; grid-row: 1; }
        .ctrl-left { grid-column: 1; grid-row: 2; }
        .ctrl-down { grid-column: 2; grid-row: 2; }
        .ctrl-right { grid-column: 3; grid-row: 2; }
        #mom-warning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; animation: warningFlash 0.3s infinite alternate; pointer-events: none; }
        @keyframes warningFlash { from { background: rgba(255,0,0,0.7); } to { background: rgba(255,0,0,0.95); } }
        .warning-text { font-size: 2rem; font-weight: bold; color: white; text-shadow: 0 0 20px white; animation: warningShake 0.5s infinite; text-align: center; padding: 0 20px; pointer-events: auto; }
        .warning-sub { font-size: 1rem; color: #ffcccc; margin-top: 15px; pointer-events: auto; }
        @keyframes warningShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        #game-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .game-over-title { font-size: 2rem; color: #ff4444; margin-bottom: 20px; }
        .game-over-reason { font-size: 1.1rem; color: #aaa; margin-bottom: 30px; text-align: center; padding: 0 30px; }
        .restart-btn { padding: 12px 40px; border: 2px solid #00ff88; border-radius: 25px; background: transparent; color: #00ff88; font-size: 1rem; cursor: pointer; transition: all 0.3s; }
        .restart-btn:hover { background: #00ff88; color: #000; }
        #level-complete { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .level-complete-title { font-size: 2rem; color: #00ff88; margin-bottom: 20px; text-shadow: 0 0 20px #00ff88; }
        #mute-hint { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); color: #ff4444; font-size: 0.8rem; opacity: 0.7; z-index: 10; }
    </style>
</head>
<body>
    <div id="menu-screen">
        <div class="stars" id="stars"></div>
        <div class="menu-title">半夜偷玩手机</div>
        <div class="menu-subtitle">STEALTH PHONE GAME</div>
        <button class="difficulty-btn btn-easy" onclick="startGame('easy')">简单</button>
        <button class="difficulty-btn btn-normal" onclick="startGame('normal')">普通</button>
        <button class="difficulty-btn btn-hard" onclick="startGame('hard')">困难</button>
        <button class="difficulty-btn btn-nightmare" onclick="startGame('nightmare')">噩梦</button>
        <button class="difficulty-btn btn-hell" onclick="startGame('hell')">地狱</button>
    </div>
    <div id="game-screen">
        <canvas id="game-canvas"></canvas>
        <div id="hud">
            <div class="hud-item"><span class="hud-label">关卡</span><span class="hud-value" id="level-display">1</span></div>
            <div class="hud-item"><span class="hud-label">光球</span><span class="hud-value" id="orb-count">0/5</span><div class="progress-bar"><div class="progress-fill" id="orb-progress" style="width: 0%"></div></div></div>
            <div class="hud-item"><span class="hud-label">生命</span><span class="hud-value" id="lives-display">❤️❤️❤️</span></div>
        </div>
        <div id="mute-hint">🔇 请静音游戏！</div>
        <div id="controls">
            <div class="ctrl-btn ctrl-up" data-dir="up">▲</div>
            <div class="ctrl-btn ctrl-left" data-dir="left">◀</div>
            <div class="ctrl-btn ctrl-down" data-dir="down">▼</div>
            <div class="ctrl-btn ctrl-right" data-dir="right">▶</div>
        </div>
    </div>
    <div id="mom-warning"><div class="warning-text">妈妈来了！快停手！</div><div class="warning-sub">不要动！不要发出声音！</div></div>
    <div id="level-complete"><div class="level-complete-title">关卡完成！</div><div style="color: #aaa; margin-bottom: 30px;">成功收集所有光球</div><button class="restart-btn" onclick="nextLevel()">下一关</button></div>
    <div id="game-over"><div class="game-over-title" id="game-over-title">游戏结束</div><div class="game-over-reason" id="game-over-reason">你被发现了！</div><button class="restart-btn" onclick="returnToMenu()">返回菜单</button></div>
    <script>
        const CONFIG = { easy: { speed: 3, orbCount: 3, obstacleCount: 2, momInterval: 15000, momDuration: 3000, lives: 5 }, normal: { speed: 4, orbCount: 5, obstacleCount: 4, momInterval: 12000, momDuration: 4000, lives: 3 }, hard: { speed: 5, orbCount: 7, obstacleCount: 6, momInterval: 10000, momDuration: 5000, lives: 3 }, nightmare: { speed: 6, orbCount: 10, obstacleCount: 8, momInterval: 8000, momDuration: 6000, lives: 2 }, hell: { speed: 7, orbCount: 15, obstacleCount: 12, momInterval: 6000, momDuration: 7000, lives: 1 } };
        let gameState = { difficulty: 'normal', level: 1, orbsCollected: 0, orbsTotal: 5, lives: 3, isRunning: false, isMomComing: false, player: { x: 0, y: 0, size: 15, speed: 4 }, orbs: [], obstacles: [], particles: [], keys: {}, touchDir: null, momTimer: null, momLeaveTimer: null, animFrameId: null };
        const canvas = document.getElementById('game-canvas'); const ctx = canvas.getContext('2d');
        function initStars() { const c = document.getElementById('stars'); c.innerHTML = ''; for (let i = 0; i < 50; i++) { const s = document.createElement('div'); s.className = 'star'; s.style.left = Math.random() * 100 + '%'; s.style.top = Math.random() * 100 + '%'; s.style.animationDelay = Math.random() * 3 + 's'; s.style.width = s.style.height = (Math.random() * 3 + 1) + 'px'; c.appendChild(s); } }
        initStars();
        function resizeCanvas() { const w = window.innerWidth; const h = window.innerHeight; if (w > 0 && h > 0) { canvas.width = w; canvas.height = h; } }
        window.addEventListener('resize', () => { if (gameState.isRunning) resizeCanvas(); });
        function hasAnyInput() { return Object.keys(gameState.keys).length > 0 || gameState.touchDir !== null; }
        function caughtByMom() { if (!gameState.isRunning || !gameState.isMomComing) return; gameOver('妈妈发现你在玩手机！被抓个正着！'); }
        function startGame(difficulty) {
            gameState.difficulty = difficulty;
            const config = CONFIG[difficulty];
            gameState.player.speed = config.speed;
            gameState.orbsTotal = config.orbCount;
            gameState.lives = config.lives;
            gameState.level = 1;
            document.getElementById('menu-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menu-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                setTimeout(() => { resizeCanvas(); initLevel(); }, 100);
            }, 500);
        }
        function isPointInObstacle(x, y, size, obstacles) { for (let obs of obstacles) { if (x + size > obs.x && x - size < obs.x + obs.width && y + size > obs.y && y - size < obs.y + obs.height) return true; } return false; }
        function initLevel() {
            const config = CONFIG[gameState.difficulty];
            gameState.orbsCollected = 0; gameState.isRunning = true; gameState.isMomComing = false;
            gameState.orbs = []; gameState.obstacles = []; gameState.particles = [];
            gameState.keys = {}; gameState.touchDir = null;
            gameState.player.x = canvas.width / 2; gameState.player.y = canvas.height / 2;
            for (let i = 0; i < config.obstacleCount; i++) {
                let obs = { x: Math.random() * (canvas.width - 60) + 30, y: Math.random() * (canvas.height - 60) + 30, width: Math.random() * 40 + 30, height: Math.random() * 40 + 30, type: Math.random() > 0.5 ? 'static' : 'moving', dx: (Math.random() - 0.5) * 2, dy: (Math.random() - 0.5) * 2 };
                let attempts = 0;
                while ((Math.abs(obs.x - gameState.player.x) < 100 && Math.abs(obs.y - gameState.player.y) < 100) && attempts < 50) { obs.x = Math.random() * (canvas.width - 60) + 30; obs.y = Math.random() * (canvas.height - 60) + 30; attempts++; }
                gameState.obstacles.push(obs);
            }
            for (let i = 0; i < config.orbCount; i++) {
                let orb = { x: Math.random() * (canvas.width - 40) + 20, y: Math.random() * (canvas.height - 40) + 20, size: 8, collected: false, pulse: Math.random() * Math.PI * 2 };
                let attempts = 0;
                while (isPointInObstacle(orb.x, orb.y, orb.size + 5, gameState.obstacles) && attempts < 100) { orb.x = Math.random() * (canvas.width - 40) + 20; orb.y = Math.random() * (canvas.height - 40) + 20; attempts++; }
                gameState.orbs.push(orb);
            }
            updateHUD(); startMomTimer(); gameLoop();
        }
        function startMomTimer() { const config = CONFIG[gameState.difficulty]; clearTimeout(gameState.momTimer); clearTimeout(gameState.momLeaveTimer); gameState.momTimer = setTimeout(() => { if (!gameState.isRunning) return; triggerMomEvent(); }, config.momInterval); }
        function triggerMomEvent() { if (!gameState.isRunning) return; if (hasAnyInput()) { caughtByMom(); return; } gameState.isMomComing = true; document.getElementById('mom-warning').style.display = 'flex'; const config = CONFIG[gameState.difficulty]; gameState.momLeaveTimer = setTimeout(() => { if (!gameState.isRunning) return; gameState.isMomComing = false; document.getElementById('mom-warning').style.display = 'none'; startMomTimer(); }, config.momDuration); }
        function updateHUD() { document.getElementById('level-display').textContent = gameState.level; document.getElementById('orb-count').textContent = gameState.orbsCollected + '/' + gameState.orbsTotal; document.getElementById('orb-progress').style.width = (gameState.orbsCollected / gameState.orbsTotal * 100) + '%'; document.getElementById('lives-display').textContent = '❤️'.repeat(gameState.lives); }
        function gameLoop() { if (!gameState.isRunning) return; update(); render(); gameState.animFrameId = requestAnimationFrame(gameLoop); }
        function update() {
            if (gameState.isMomComing) { if (hasAnyInput()) caughtByMom(); updateObstacles(); updateParticles(); return; }
            const player = gameState.player; let dx = 0, dy = 0;
            if (gameState.keys['ArrowUp'] || gameState.keys['w'] || gameState.keys['W']) dy -= 1;
            if (gameState.keys['ArrowDown'] || gameState.keys['s'] || gameState.keys['S']) dy += 1;
            if (gameState.keys['ArrowLeft'] || gameState.keys['a'] || gameState.keys['A']) dx -= 1;
            if (gameState.keys['ArrowRight'] || gameState.keys['d'] || gameState.keys['D']) dx += 1;
            if (gameState.touchDir) { if (gameState.touchDir === 'up') dy -= 1; if (gameState.touchDir === 'down') dy += 1; if (gameState.touchDir === 'left') dx -= 1; if (gameState.touchDir === 'right') dx += 1; }
            if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
            player.x += dx * player.speed; player.y += dy * player.speed;
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));
            updateObstacles();
            gameState.orbs.forEach(orb => { if (orb.collected) return; const dist = Math.hypot(player.x - orb.x, player.y - orb.y); if (dist < player.size + orb.size) { orb.collected = true; gameState.orbsCollected++; for (let i = 0; i < 8; i++) gameState.particles.push({ x: orb.x, y: orb.y, dx: (Math.random() - 0.5) * 4, dy: (Math.random() - 0.5) * 4, life: 1, color: '#00ff88' }); updateHUD(); if (gameState.orbsCollected >= gameState.orbsTotal) levelComplete(); } });
            gameState.obstacles.forEach(obs => { if (player.x + player.size > obs.x && player.x - player.size < obs.x + obs.width && player.y + player.size > obs.y && player.y - player.size < obs.y + obs.height) { player.x -= dx * player.speed * 2; player.y -= dy * player.speed * 2; gameState.lives--; updateHUD(); for (let i = 0; i < 5; i++) gameState.particles.push({ x: player.x, y: player.y, dx: (Math.random() - 0.5) * 6, dy: (Math.random() - 0.5) * 6, life: 1, color: '#ff4444' }); if (gameState.lives <= 0) gameOver('撞到太多障碍物，手机摔坏了！'); } });
            updateParticles(); gameState.orbs.forEach(orb => { orb.pulse += 0.05; });
        }
        function updateObstacles() { gameState.obstacles.forEach(obs => { if (obs.type === 'moving') { obs.x += obs.dx; obs.y += obs.dy; if (obs.x <= 0 || obs.x + obs.width >= canvas.width) obs.dx *= -1; if (obs.y <= 0 || obs.y + obs.height >= canvas.height) obs.dy *= -1; } }); }
        function updateParticles() { gameState.particles = gameState.particles.filter(p => { p.x += p.dx; p.y += p.dy; p.life -= 0.05; return p.life > 0; }); }
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
            gameState.orbs.forEach(orb => { if (orb.collected) return; const pulseSize = orb.size + Math.sin(orb.pulse) * 3; const gradient = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, pulseSize * 3); gradient.addColorStop(0, 'rgba(255,255,100,0.8)'); gradient.addColorStop(0.5, 'rgba(255,200,50,0.3)'); gradient.addColorStop(1, 'rgba(255,200,50,0)'); ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(orb.x, orb.y, pulseSize * 3, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#ffff66'; ctx.beginPath(); ctx.arc(orb.x, orb.y, orb.size, 0, Math.PI * 2); ctx.fill(); });
            gameState.obstacles.forEach(obs => { ctx.fillStyle = obs.type === 'moving' ? 'rgba(255,80,80,0.8)' : 'rgba(180,60,60,0.8)'; ctx.fillRect(obs.x, obs.y, obs.width, obs.height); ctx.strokeStyle = 'rgba(255,100,100,0.5)'; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.width, obs.height); ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '12px Arial'; ctx.textAlign = 'center'; ctx.fillText('!', obs.x + obs.width/2, obs.y + obs.height/2 + 4); });
            const player = gameState.player; const playerGlow = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.size * 4); playerGlow.addColorStop(0, 'rgba(0,255,136,0.4)'); playerGlow.addColorStop(1, 'rgba(0,255,136,0)'); ctx.fillStyle = playerGlow; ctx.beginPath(); ctx.arc(player.x, player.y, player.size * 4, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#00ff88'; ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(player.x - 4, player.y - 4, player.size * 0.3, 0, Math.PI * 2); ctx.fill();
            gameState.particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill(); }); ctx.globalAlpha = 1;
        }
        function levelComplete() { if (!gameState.isRunning) return; gameState.isRunning = false; clearTimeout(gameState.momTimer); clearTimeout(gameState.momLeaveTimer); if (gameState.animFrameId) cancelAnimationFrame(gameState.animFrameId); document.getElementById('mom-warning').style.display = 'none'; document.getElementById('level-complete').style.display = 'flex'; }
        function nextLevel() { gameState.level++; document.getElementById('level-complete').style.display = 'none'; const config = CONFIG[gameState.difficulty]; config.obstacleCount = Math.min(config.obstacleCount + 1, 20); config.orbCount = Math.min(config.orbCount + 1, 20); initLevel(); }
        function gameOver(reason) { if (!gameState.isRunning) return; gameState.isRunning = false; clearTimeout(gameState.momTimer); clearTimeout(gameState.momLeaveTimer); if (gameState.animFrameId) cancelAnimationFrame(gameState.animFrameId); document.getElementById('mom-warning').style.display = 'none'; document.getElementById('game-over-reason').textContent = reason; document.getElementById('game-over').style.display = 'flex'; }
        function returnToMenu() { clearTimeout(gameState.momTimer); clearTimeout(gameState.momLeaveTimer); if (gameState.animFrameId) cancelAnimationFrame(gameState.animFrameId); gameState.isRunning = false; gameState.isMomComing = false; gameState.keys = {}; gameState.touchDir = null; document.getElementById('game-over').style.display = 'none'; document.getElementById('level-complete').style.display = 'none'; document.getElementById('game-screen').style.display = 'none'; document.getElementById('mom-warning').style.display = 'none'; document.getElementById('menu-screen').style.display = 'flex'; document.getElementById('menu-screen').style.opacity = '1'; }
        window.addEventListener('keydown', (e) => { gameState.keys[e.key] = true; if (gameState.isMomComing && gameState.isRunning) caughtByMom(); });
        window.addEventListener('keyup', (e) => { delete gameState.keys[e.key]; });
        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            const dir = btn.dataset.dir;
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); gameState.touchDir = dir; if (gameState.isMomComing && gameState.isRunning) caughtByMom(); }, { passive: false });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); if (gameState.touchDir === dir) gameState.touchDir = null; }, { passive: false });
            btn.addEventListener('touchcancel', (e) => { e.preventDefault(); if (gameState.touchDir === dir) gameState.touchDir = null; }, { passive: false });
            btn.addEventListener('mousedown', () => { gameState.touchDir = dir; if (gameState.isMomComing && gameState.isRunning) caughtByMom(); });
            btn.addEventListener('mouseup', () => { if (gameState.touchDir === dir) gameState.touchDir = null; });
            btn.addEventListener('mouseleave', () => { if (gameState.touchDir === dir) gameState.touchDir = null; });
        });
        document.addEventListener('touchmove', (e) => { if (gameState.isRunning) e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
